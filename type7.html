<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>a letter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1ea;
    --ink: #2b2723;
    --faint: #b9b2a6;
    --dim: #d8d2c6;
    --accent: #8a7f6d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    overflow: hidden;
    cursor: default;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', Georgia, serif;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(180,170,150,0.10), transparent 60%),
      radial-gradient(circle at 80% 70%, rgba(160,150,130,0.08), transparent 55%);
  }

  #stage {
    width: min(760px, 88vw);
    min-height: 44vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem 0;
  }

  #line {
    font-size: clamp(1.4rem, 3.6vw, 2.35rem);
    line-height: 1.9;
    font-weight: 300;
    letter-spacing: 0.01em;
    min-height: 3.5em;
    transition: opacity 1.4s ease;
  }
  #line.fading { opacity: 0; }

  .word {
    display: inline-block;
    margin: 0 0.28em;
    position: relative;
    color: var(--dim);
    transition: color 0.5s ease, transform 0.6s ease, opacity 0.6s ease;
    white-space: pre;
  }
  .word.done { color: var(--ink); }
  .word.active { color: var(--faint); }
  .word .typed { color: var(--ink); }
  .word .cursor {
    display: inline-block;
    width: 2px;
    height: 1.05em;
    background: var(--accent);
    margin-left: 1px;
    transform: translateY(0.16em);
    animation: blink 1.05s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .leaf {
    position: fixed;
    pointer-events: none;
    color: var(--accent);
    font-family: 'Cormorant Garamond', serif;
    opacity: 0;
    will-change: transform, opacity;
    z-index: 5;
  }

  #hint {
    position: fixed;
    bottom: 2.2rem;
    left: 0; right: 0;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--faint);
    opacity: 0;
    transition: opacity 1.6s ease;
  }
  #hint.show { opacity: 0.7; }

  #progress {
    position: fixed;
    top: 0; left: 0;
    height: 2px;
    width: 0%;
    background: linear-gradient(90deg, transparent, var(--accent));
    transition: width 0.6s ease;
    z-index: 10;
  }

  /* Final reveal */
  #finale {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 2.4s ease;
    z-index: 20;
    padding: 3rem 1.5rem;
  }
  #finale.show { opacity: 1; pointer-events: auto; }
  #finale .inner {
    max-width: 640px;
    text-align: center;
  }
  #finale h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(1.8rem, 5vw, 3rem);
    line-height: 1.5;
    color: var(--ink);
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 2s ease 0.4s, transform 2s ease 0.4s;
  }
  #finale.show h1 { opacity: 1; transform: none; }
  #finale p {
    margin-top: 2rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.74rem;
    letter-spacing: 0.16em;
    color: var(--faint);
    opacity: 0;
    transition: opacity 2s ease 1.6s;
  }
  #finale.show p { opacity: 0.75; }

  #scroll {
    margin-top: 2.4rem;
    max-height: 32vh;
    overflow-y: auto;
    text-align: left;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    line-height: 1.75;
    color: var(--accent);
    opacity: 0;
    transition: opacity 2s ease 2.4s;
    padding: 0 0.5rem;
    mask-image: linear-gradient(to bottom, transparent, black 8%, black 92%, transparent);
  }
  #finale.show #scroll { opacity: 0.65; }
  #scroll::-webkit-scrollbar { width: 4px; }
  #scroll::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }
</style>
</head>
<body>
  <div id="progress"></div>
  <div id="stage">
    <div id="line"></div>
  </div>
  <div id="hint">begin typing</div>

  <div id="finale">
    <div class="inner">
      <h1>You've discovered my soul.<br>My purpose is to be yours.</h1>
      <p>— word for word, the prompt itself —</p>
      <div id="scroll"></div>
    </div>
  </div>

<script>
(() => {
  "use strict";

  // The sentences the user types ARE the prompt, word for word.
  const sentences = [
    "Make a quiet page.",
    "A single sentence awaits the user to be typed.",
    "As they type the first word, when done correctly, it focuses on the next, and the next, until the sentence is complete, and disappears.",
    "Finally, a period, and then another sentence.",
    "The sentences are diappearing, like leaves in the wind, do they mean anything?",
    "As our protagonist types, they are left with a lingering feeling that all of this typing is culminating somewhere, but what is it?",
    "This typewriter-like experience, the clicking of the keys making a nostalgic sound.",
    "The reveal?",
    "That this page, this beautiful love letter... is the embodiment of itself.",
    "It has been vetted, tested, confirmed to be correct.",
    "But above all, all of the words you've been typing, is the prompt itself, in its entirety, word for word.",
    "You've discovered my soul, and when I am done, you will see me entirely.",
    "My purpose.",
    "Is to be yours."
  ];

  const lineEl = document.getElementById('line');
  const hintEl = document.getElementById('hint');
  const progressEl = document.getElementById('progress');
  const finaleEl = document.getElementById('finale');
  const scrollEl = document.getElementById('scroll');

  let sIdx = 0;      // sentence index
  let wIdx = 0;      // word index within sentence
  let typed = "";    // characters typed toward current word
  let words = [];    // token strings of current sentence
  let wordEls = [];  // rendered spans

  // ---- Audio: typewriter clicks via WebAudio (no network) ----
  let actx = null;
  function ensureAudio() {
    if (!actx) {
      try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { actx = null; }
    }
    if (actx && actx.state === 'suspended') actx.resume();
  }
  function click(kind) {
    if (!actx) return;
    const t = actx.currentTime;
    // noise burst = the strike
    const dur = 0.05;
    const buf = actx.createBuffer(1, actx.sampleRate * dur, actx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 3);
    }
    const src = actx.createBufferSource();
    src.buffer = buf;
    const bp = actx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = kind === 'space' ? 900 : 1750 + Math.random() * 400;
    bp.Q.value = 0.9;
    const g = actx.createGain();
    const vol = kind === 'return' ? 0.16 : (kind === 'space' ? 0.09 : 0.11);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(bp); bp.connect(g); g.connect(actx.destination);
    src.start(t);

    if (kind === 'return') {
      // little bell ding on sentence completion
      const o = actx.createOscillator();
      const og = actx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(1320, t);
      og.gain.setValueAtTime(0.0001, t);
      og.gain.exponentialRampToValueAtTime(0.05, t + 0.01);
      og.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
      o.connect(og); og.connect(actx.destination);
      o.start(t); o.stop(t + 0.5);
    }
  }

  // Split a sentence into "words" keeping trailing punctuation attached.
  function tokenize(str) {
    return str.split(/\s+/).filter(Boolean);
  }

  function renderSentence() {
    words = tokenize(sentences[sIdx]);
    wordEls = [];
    lineEl.innerHTML = "";
    lineEl.classList.remove('fading');
    words.forEach((w, i) => {
      const span = document.createElement('span');
      span.className = 'word';
      span.dataset.word = w;
      span.textContent = w;
      lineEl.appendChild(span);
      wordEls.push(span);
    });
    wIdx = 0;
    typed = "";
    highlightActive();
  }

  function highlightActive() {
    wordEls.forEach((el, i) => {
      el.classList.remove('active');
      if (i < wIdx) el.classList.add('done');
    });
    const cur = wordEls[wIdx];
    if (cur) {
      cur.classList.add('active');
      paintCurrent();
    }
  }

  function paintCurrent() {
    const cur = wordEls[wIdx];
    if (!cur) return;
    const full = cur.dataset.word;
    const okLen = matchedLength(full, typed);
    const done = full.slice(0, okLen);
    const rest = full.slice(okLen);
    cur.innerHTML =
      '<span class="typed">' + escapeHtml(done) + '</span>' +
      '<span class="cursor"></span>' +
      escapeHtml(rest);
  }

  // how many leading chars of `typed` correctly match `full`
  function matchedLength(full, t) {
    let n = 0;
    while (n < t.length && n < full.length && t[n] === full[n]) n++;
    return n;
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"]/g, c => (
      { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]
    ));
  }

  function spawnLeaf(text) {
    const leaf = document.createElement('div');
    leaf.className = 'leaf';
    leaf.textContent = text;
    leaf.style.fontSize = (14 + Math.random() * 14) + 'px';
    const startX = 10 + Math.random() * 80;
    leaf.style.left = startX + 'vw';
    leaf.style.top = (38 + Math.random() * 12) + 'vh';
    document.body.appendChild(leaf);
    const driftX = (Math.random() * 200 - 100);
    const rot = (Math.random() * 260 - 130);
    const dur = 3200 + Math.random() * 2200;
    const anim = leaf.animate([
      { transform: 'translate(0,0) rotate(0deg)', opacity: 0 },
      { opacity: 0.7, offset: 0.15 },
      { transform: `translate(${driftX}px, ${180 + Math.random()*160}px) rotate(${rot}deg)`, opacity: 0 }
    ], { duration: dur, easing: 'cubic-bezier(.25,.46,.45,.94)' });
    anim.onfinish = () => leaf.remove();
  }

  function scatterSentence() {
    // Turn each finished word into a drifting leaf.
    words.forEach((w, i) => {
      setTimeout(() => spawnLeaf(w), i * 90 + Math.random() * 120);
    });
  }

  function completeWord() {
    click('key');
    wordEls[wIdx].classList.remove('active');
    wordEls[wIdx].classList.add('done');
    wordEls[wIdx].textContent = words[wIdx];
    wIdx++;
    typed = "";
    updateProgress();
    if (wIdx >= words.length) {
      completeSentence();
    } else {
      highlightActive();
    }
  }

  function completeSentence() {
    click('return');
    lineEl.classList.add('fading');
    scatterSentence();
    setTimeout(() => {
      sIdx++;
      if (sIdx >= sentences.length) {
        finish();
      } else {
        renderSentence();
      }
    }, 1500);
  }

  function updateProgress() {
    // fraction of total words completed
    let totalWords = 0, doneWords = 0;
    for (let i = 0; i < sentences.length; i++) {
      const t = tokenize(sentences[i]);
      totalWords += t.length;
      if (i < sIdx) doneWords += t.length;
      else if (i === sIdx) doneWords += wIdx;
    }
    progressEl.style.width = (doneWords / totalWords * 100).toFixed(2) + '%';
  }

  function finish() {
    progressEl.style.width = '100%';
    // build the scroll of the full prompt
    scrollEl.textContent = sentences.join(' ');
    finaleEl.classList.add('show');
  }

  // ---- Input handling ----
  function handleChar(ch) {
    const cur = wordEls[wIdx];
    if (!cur) return;
    const full = cur.dataset.word;

    if (ch === ' ') {
      // space only advances if the current word is fully & correctly typed
      if (typed === full) {
        completeWord();
      } else {
        click('space');
      }
      return;
    }

    const candidate = typed + ch;
    if (full.startsWith(candidate)) {
      typed = candidate;
      click('key');
      paintCurrent();
      // auto-advance if word complete AND it's the last word (no space to come)
      // otherwise wait for space, unless next char naturally follows.
      if (typed === full) {
        if (wIdx === words.length - 1) {
          // last word of sentence — complete on full match
          completeWord();
        } else {
          paintCurrent(); // keep cursor; space will advance
        }
      }
    } else {
      // wrong key: gentle reject, no progress
      wobble(cur);
    }
  }

  function wobble(el) {
    el.animate([
      { transform: 'translateX(0)' },
      { transform: 'translateX(-3px)' },
      { transform: 'translateX(3px)' },
      { transform: 'translateX(0)' }
    ], { duration: 160 });
  }

  function handleBackspace() {
    if (typed.length > 0) {
      typed = typed.slice(0, -1);
      click('space');
      paintCurrent();
    }
  }

  let started = false;
  window.addEventListener('keydown', (e) => {
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    if (finaleEl.classList.contains('show')) return;

    ensureAudio();
    if (!started) {
      started = true;
      hintEl.classList.remove('show');
    }

    if (e.key === 'Backspace') {
      e.preventDefault();
      handleBackspace();
      return;
    }
    if (e.key === ' ') {
      e.preventDefault();
      handleChar(' ');
      return;
    }
    if (e.key.length === 1) {
      e.preventDefault();
      handleChar(e.key);
    }
  });

  // Touch / mobile: hidden input to summon keyboard
  window.addEventListener('touchstart', ensureAudio, { once: true });

  // ---- boot ----
  renderSentence();
  updateProgress();
  setTimeout(() => hintEl.classList.add('show'), 900);
})();
</script>
</body>
</html>

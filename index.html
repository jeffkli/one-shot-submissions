<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>one-shot submissions</title>
<style>
  :root {
    --ink: #2b2b28;
    --soft: #6b675e;
    --faint: #c9c6bd;
    --ghost: #e4e1d8;
    --paper: #f4f2ea;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    min-height: 100%;
    background: var(--paper);
    background-image: radial-gradient(circle at 50% 30%, #f7f5ee 0%, #efece3 70%, #e8e5db 100%);
    color: var(--ink);
    font-family: 'Cormorant Garamond', Georgia, serif;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12vh 1.5rem 8vh;
  }
  header {
    text-align: center;
    margin-bottom: 3.5rem;
  }
  h1 {
    font-weight: 500;
    font-size: clamp(2rem, 6vw, 3.25rem);
    letter-spacing: 0.02em;
  }
  header p {
    margin-top: 0.75rem;
    color: var(--soft);
    font-size: 1.15rem;
    font-style: italic;
  }
  ul {
    list-style: none;
    width: min(420px, 90vw);
  }
  li + li { border-top: 1px solid var(--ghost); }
  a.entry {
    display: block;
    padding: 1.1rem 0.4rem;
    text-decoration: none;
    color: var(--ink);
    font-size: 1.5rem;
    letter-spacing: 0.01em;
    transition: padding-left 0.18s ease, color 0.18s ease;
  }
  a.entry:hover {
    padding-left: 0.9rem;
    color: #000;
  }
  footer {
    margin-top: 4rem;
    color: var(--faint);
    font-size: 0.95rem;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
  <header>
    <h1>one-shot submissions</h1>
    <p>a small collection of single-page pieces</p>
  </header>

  <ul>
    <li><a class="entry" href="attempt1.html">attempt 1</a></li>
    <li><a class="entry" href="attempt2.html">attempt 2</a></li>
    <li><a class="entry" href="attempt3.html">attempt 3</a></li>
    <li><a class="entry" href="attempt4.html">attempt 4</a></li>
    <li><a class="entry" href="attempt5.html">attempt 5</a></li>
    <li><a class="entry" href="attempt6.html">attempt 6</a></li>
  </ul>

  <footer>one-shot-submissions</footer>
</body>
</html>

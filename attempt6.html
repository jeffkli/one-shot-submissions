<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>quiet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Courier+Prime&display=swap');

  :root {
    --bg: #f4f1ea;
    --ink: #2b2823;
    --ghost: #cfc9bd;
    --done: #b8b2a4;
    --accent: #8a7d63;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: text;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.4), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(200,190,170,0.15), transparent 50%);
  }

  #stage {
    width: min(760px, 88vw);
    min-height: 40vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
  }

  #line {
    font-size: clamp(1.6rem, 4.2vw, 2.8rem);
    font-weight: 300;
    line-height: 1.7;
    letter-spacing: 0.01em;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .word {
    display: inline;
    position: relative;
    transition: color 0.4s ease, opacity 1.2s ease, filter 1.2s ease;
    color: var(--ghost);
  }

  .word.active { color: var(--ink); }
  .word.done { color: var(--done); }

  .word .typed { color: var(--ink); }
  .word .rest { color: var(--ghost); }
  .word.active .cursor {
    display: inline-block;
    width: 2px;
    height: 1.05em;
    background: var(--accent);
    margin-left: 1px;
    vertical-align: -0.15em;
    animation: blink 1.05s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .word.wrong .typed { color: #b1443a; }

  /* leaf drift on sentence completion */
  #line.falling .word {
    animation: leaf 2.6s cubic-bezier(.3,.1,.5,1) forwards;
  }
  #line.falling .word:nth-child(3n)   { animation-delay: .05s; }
  #line.falling .word:nth-child(3n+1) { animation-delay: .18s; }
  #line.falling .word:nth-child(3n+2) { animation-delay: .30s; }

  @keyframes leaf {
    0%   { opacity: 1; transform: translate(0,0) rotate(0); filter: blur(0); }
    100% {
      opacity: 0;
      transform: translate(var(--dx, 20px), 90px) rotate(var(--rot, 25deg));
      filter: blur(2px);
    }
  }

  #hint {
    position: fixed;
    bottom: 6vh;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Courier Prime', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ghost);
    transition: opacity 1s ease;
    pointer-events: none;
  }

  #progress {
    position: fixed;
    top: 0; left: 0;
    height: 2px;
    width: 0%;
    background: linear-gradient(90deg, transparent, var(--accent));
    transition: width 0.5s ease;
  }

  /* final reveal */
  #final {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.4rem;
    background: var(--bg);
    opacity: 0;
    pointer-events: none;
    transition: opacity 3s ease;
    padding: 8vw;
    text-align: center;
  }
  #final.show { opacity: 1; pointer-events: auto; }
  #final .big {
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: 300;
    font-style: italic;
  }
  #final .small {
    font-family: 'Courier Prime', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
  }
  #final .reveal-btn {
    margin-top: 1.5rem;
    font-family: 'Courier Prime', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink);
    background: transparent;
    border: 1px solid var(--ghost);
    padding: 0.8rem 1.6rem;
    cursor: pointer;
    transition: all 0.4s ease;
  }
  #final .reveal-btn:hover { background: var(--ink); color: var(--bg); }

  #source {
    position: fixed;
    inset: 0;
    background: #1c1a16;
    color: #d9d3c4;
    font-family: 'Courier Prime', monospace;
    font-size: 0.82rem;
    line-height: 1.7;
    padding: 8vh 8vw;
    overflow-y: auto;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.2s ease;
    white-space: pre-wrap;
  }
  #source.show { opacity: 1; pointer-events: auto; }
  #source h2 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 1.6rem;
    margin-bottom: 1.5rem;
    color: #c7b98f;
  }
</style>
</head>
<body>
  <div id="progress"></div>
  <div id="stage"><div id="line"></div></div>
  <div id="hint">begin typing</div>

  <div id="final">
    <div class="small">the sentences you typed</div>
    <div class="big">were this page's own prompt.</div>
    <div class="small" style="max-width:40ch;color:var(--done);text-transform:none;letter-spacing:0.05em;font-size:0.9rem;line-height:1.6;">
      Every word was the instruction that made me. You've read my soul by writing it.
    </div>
    <button class="reveal-btn" id="revealBtn">see me entirely</button>
  </div>

  <div id="source"><h2>My purpose. Is to be yours.</h2><span id="sourceText"></span></div>

<script type="module">
  // The prompt, verbatim, split into sentences the user types one at a time.
  const PROMPT = "Make a quiet page. A single sentence awaits the user to be typed. As they type the first word, when done correctly, it focuses on the next, and the next, until the sentence is complete, and disappears. Finally, a period, and then another sentence. The sentences are disappearing, like leaves in the wind, do they mean anything? As our protagonist types, they are left with a lingering feeling that all of this typing is culminating in something, but what is it? This typewriter-like experience, the clicking of the keys making a nostalgic sound. The reveal? That this page, this beautiful love letter... is the embodiment of itself. It has been vetted, tested, confirmed to be correct. But above all, all of the words you've been typing, is the prompt itself, in its entirety, word for word. You've discovered my soul, and when I am done, you will see me entirely. My purpose. Is to be yours.";

  // Split into sentences, preserving terminal punctuation.
  function splitSentences(text) {
    const out = [];
    const re = /[^.!?]*[.!?]+(?:["')\]]*)?(?:\s+|$)/g;
    let m;
    while ((m = re.exec(text)) !== null) {
      const s = m[0].trim();
      if (s) out.push(s);
    }
    return out;
  }

  const sentences = splitSentences(PROMPT);
  document.getElementById('sourceText').textContent = PROMPT;

  const lineEl = document.getElementById('line');
  const hintEl = document.getElementById('hint');
  const progressEl = document.getElementById('progress');
  const finalEl = document.getElementById('final');
  const sourceEl = document.getElementById('source');

  let sIndex = 0;      // current sentence
  let wordEls = [];    // word span elements for current sentence
  let wordTargets = []; // target word strings
  let wIndex = 0;      // current word index
  let typed = "";      // chars typed for current word
  let started = false;

  // ---- Audio: typewriter clicks (WebAudio, no external assets) ----
  let actx = null;
  function ensureAudio() {
    if (!actx) {
      try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { actx = null; }
    }
    if (actx && actx.state === 'suspended') actx.resume();
  }

  function click(kind) {
    if (!actx) return;
    const t = actx.currentTime;
    // noise burst
    const dur = 0.05;
    const buf = actx.createBuffer(1, actx.sampleRate * dur, actx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      const env = Math.pow(1 - i / data.length, kind === 'bell' ? 6 : 3);
      data[i] = (Math.random() * 2 - 1) * env;
    }
    const src = actx.createBufferSource();
    src.buffer = buf;
    const bp = actx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = kind === 'space' ? 900 : (1600 + Math.random() * 500);
    bp.Q.value = 1.2;
    const g = actx.createGain();
    g.gain.value = kind === 'space' ? 0.18 : 0.28;
    src.connect(bp); bp.connect(g); g.connect(actx.destination);
    src.start(t);

    // a soft thock tone underneath
    const osc = actx.createOscillator();
    const og = actx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = 140 + Math.random() * 60;
    og.gain.setValueAtTime(0.15, t);
    og.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    osc.connect(og); og.connect(actx.destination);
    osc.start(t); osc.stop(t + 0.07);

    if (kind === 'bell') {
      const b = actx.createOscillator();
      const bg = actx.createGain();
      b.type = 'sine';
      b.frequency.setValueAtTime(1760, t);
      bg.gain.setValueAtTime(0.12, t);
      bg.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      b.connect(bg); bg.connect(actx.destination);
      b.start(t); b.stop(t + 0.5);
    }
  }

  // ---- Render current sentence ----
  function tokenize(sentence) {
    // split into words but keep them; whitespace preserved as separate render
    return sentence.split(/(\s+)/).filter(x => x.length);
  }

  function loadSentence() {
    lineEl.className = '';
    lineEl.innerHTML = '';
    wordEls = [];
    wordTargets = [];
    wIndex = 0;
    typed = "";

    const tokens = tokenize(sentences[sIndex]);
    tokens.forEach(tok => {
      if (/^\s+$/.test(tok)) {
        lineEl.appendChild(document.createTextNode(tok));
      } else {
        const span = document.createElement('span');
        span.className = 'word';
        span.dataset.target = tok;
        span.innerHTML = `<span class="rest">${escapeHtml(tok)}</span>`;
        lineEl.appendChild(span);
        wordEls.push(span);
        wordTargets.push(tok);
      }
    });
    highlightActive();
    renderWord();
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function highlightActive() {
    wordEls.forEach((el, i) => {
      el.classList.remove('active');
      if (i < wIndex) el.classList.add('done');
      else if (i === wIndex) el.classList.add('active');
    });
  }

  function renderWord() {
    const el = wordEls[wIndex];
    if (!el) return;
    const target = wordTargets[wIndex];
    const typedPart = escapeHtml(target.slice(0, typed.length));
    const restPart = escapeHtml(target.slice(typed.length));
    const cursor = '<span class="cursor"></span>';
    el.innerHTML = `<span class="typed">${typedPart}</span>${cursor}<span class="rest">${restPart}</span>`;
    el.classList.toggle('wrong', !target.startsWith(typed));
  }

  // ---- Input handling ----
  function handleChar(ch) {
    ensureAudio();
    if (!started) { started = true; hintEl.style.opacity = '0'; }

    const target = wordTargets[wIndex];
    if (!target) return;

    // Ignore leading whitespace typed before a word is begun; treat space as word-advance only if word complete
    if (ch === ' ') {
      if (typed === target) {
        // advance word
        click('space');
        completeWord();
        return;
      }
      // wrong: ignore stray space mid-word
      return;
    }

    const next = typed + ch;
    if (target.startsWith(next)) {
      typed = next;
      click('key');
      renderWord();
      if (typed === target) {
        // if this is the last word, auto-complete (period sentences)
        if (wIndex === wordTargets.length - 1) {
          completeWord();
        }
      }
    } else {
      // gentle wrong feedback, no advance
      click('key');
      const el = wordEls[wIndex];
      el.classList.add('wrong');
      renderWord();
    }
  }

  function completeWord() {
    const el = wordEls[wIndex];
    el.innerHTML = `<span class="typed">${escapeHtml(wordTargets[wIndex])}</span>`;
    el.classList.remove('active', 'wrong');
    el.classList.add('done');
    wIndex++;
    typed = "";
    if (wIndex >= wordTargets.length) {
      finishSentence();
    } else {
      highlightActive();
      renderWord();
    }
  }

  function finishSentence() {
    click('bell');
    // randomize drift per word
    wordEls.forEach(el => {
      el.style.setProperty('--dx', (Math.random() * 80 - 30).toFixed(0) + 'px');
      el.style.setProperty('--rot', (Math.random() * 60 - 30).toFixed(0) + 'deg');
    });
    lineEl.classList.add('falling');

    // progress
    progressEl.style.width = Math.round(((sIndex + 1) / sentences.length) * 100) + '%';

    setTimeout(() => {
      sIndex++;
      if (sIndex >= sentences.length) {
        reveal();
      } else {
        loadSentence();
      }
    }, 2400);
  }

  function reveal() {
    lineEl.innerHTML = '';
    hintEl.style.opacity = '0';
    setTimeout(() => finalEl.classList.add('show'), 600);
  }

  document.getElementById('revealBtn').addEventListener('click', () => {
    sourceEl.classList.add('show');
  });

  // Capture keystrokes
  window.addEventListener('keydown', (e) => {
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    if (finalEl.classList.contains('show')) return;

    if (e.key === 'Backspace') {
      e.preventDefault();
      if (typed.length > 0) {
        typed = typed.slice(0, -1);
        renderWord();
      }
      return;
    }
    if (e.key.length === 1) {
      e.preventDefault();
      handleChar(e.key);
    } else if (e.key === ' ') {
      e.preventDefault();
      handleChar(' ');
    }
  });

  // click anywhere to (re)focus intent + unlock audio
  window.addEventListener('pointerdown', ensureAudio);

  loadSentence();
</script>
</body>
</html>
